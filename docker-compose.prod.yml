services:
  backend:
    # Prefer immutable tags in production, e.g. BACKEND_IMAGE_TAG=v1.4.2
    image: ghcr.io/itsddpanda/private_fund_analyzer-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: pfa-backend
    # Internal-only by default. Uncomment ports only when direct host API access is required.
    # ports:
    #   - "8001:8001"
    volumes:
      - back_data:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    # Prefer immutable tags in production, e.g. FRONTEND_IMAGE_TAG=v1.4.2
    image: ghcr.io/itsddpanda/private_fund_analyzer-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: pfa-frontend
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  back_data:
    name: pfa-back-data
