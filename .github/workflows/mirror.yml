name: Mirror to Public Repo

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ secrets.PUBLIC_REPO_NAME }}

      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # CRITICAL: This prevents the local token from overriding your push token
          persist-credentials: false 

      - name: Push to Public Repo
        env:
          APP_TOKEN: ${{ steps.generate_token.outputs.token }}
          PUBLIC_REPO: ${{ secrets.PUBLIC_REPO_NAME }}
        run: |
          # Use the token explicitly in the URL
          git remote add public "https://x-access-token:${APP_TOKEN}@github.com/itsddpanda/${PUBLIC_REPO}.git"
          
          # Force push to the public repo
          git push public main --force
