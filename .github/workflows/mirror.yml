name: Mirror to Public Repo

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to test manually from the Actions tab

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # No 'repositories' line needed now that 'All repositories' is enabled

      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Push to Public Repo
        run: |
          # Use your exact public repo name here
          PUBLIC_URL="https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/itsddpanda/pub_personal_portfolio.git"
          
          git remote add public "$PUBLIC_URL" || git remote set-url public "$PUBLIC_URL"
          
          # Force push the main branch
          git push public main --force
