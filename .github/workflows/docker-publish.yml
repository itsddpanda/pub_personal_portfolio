name: Build, Publish, and Release on Tag

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: itsddpanda/private_fund_analyzer

jobs:
  docker:
    name: Build and push backend/frontend images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *-* ]]; then
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}-backend
          tags: |
            type=raw,value=${{ steps.tags.outputs.version_tag }}
            type=raw,value=latest,enable=${{ steps.tags.outputs.publish_latest == 'true' }}

      - name: Extract Docker metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}-frontend
          tags: |
            type=raw,value=${{ steps.tags.outputs.version_tag }}
            type=raw,value=latest,enable=${{ steps.tags.outputs.publish_latest == 'true' }}

      - name: Build and push backend image
        id: push-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        id: push-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Prepare release notes body from changelog/tag metadata
        id: release-notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          {
            echo "# ${TAG}"
            echo
            echo "## Container Images"
            echo
            echo "- Backend: \`${{ env.REGISTRY }}/${{ env.REPO }}-backend:${TAG}\`"
            if [[ "${{ steps.tags.outputs.publish_latest }}" == "true" ]]; then
              echo "- Backend (rolling): \`${{ env.REGISTRY }}/${{ env.REPO }}-backend:latest\`"
            fi
            echo "- Frontend: \`${{ env.REGISTRY }}/${{ env.REPO }}-frontend:${TAG}\`"
            if [[ "${{ steps.tags.outputs.publish_latest }}" == "true" ]]; then
              echo "- Frontend (rolling): \`${{ env.REGISTRY }}/${{ env.REPO }}-frontend:latest\`"
            fi
            echo
            if [[ -f CHANGELOG.md ]]; then
              section=$(awk -v tag="$TAG" '
                BEGIN {capture=0}
                $0 ~ "^##[[:space:]]*\\[?" tag "\\]?" {capture=1; next}
                capture && $0 ~ "^##[[:space:]]+" {exit}
                capture {print}
              ' CHANGELOG.md)

              if [[ -n "$section" ]]; then
                echo "## Changelog"
                echo
                echo "$section"
                echo
              fi
            fi

            echo "## Full Changelog"
            echo
            echo "See the auto-generated summary below for commits included in this release."
          } > release-notes.md

      - name: Create GitHub Release and upload compose asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: true
          files: docker-compose.prod.yml
