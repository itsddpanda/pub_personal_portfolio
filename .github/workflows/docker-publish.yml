name: Create Release and Publish Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach assets to (e.g. v1.2.3). Leave empty to auto-generate.'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mfa

jobs:
  prepare:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - id: set_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            VERSION="$(date +%Y.%-m.%-d)"
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          fi

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check docker-compose.prod.yml exists
        run: test -f docker-compose.prod.yml || (echo "docker-compose.prod.yml not found!" && exit 1)

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=${{ needs.prepare.outputs.release_tag }}

      - name: Build and push Backend image
        id: build-and-push-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Sign the published backend image
        env:
          TAGS: ${{ steps.meta-backend.outputs.tags }}
          DIGEST: ${{ steps.build-and-push-backend.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check docker-compose.prod.yml exists
        run: test -f docker-compose.prod.yml || (echo "docker-compose.prod.yml not found!" && exit 1)

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=${{ needs.prepare.outputs.release_tag }}

      - name: Build and push Frontend image
        id: build-and-push-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Sign the published frontend image
        env:
          TAGS: ${{ steps.meta-frontend.outputs.tags }}
          DIGEST: ${{ steps.build-and-push-frontend.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  upload-release-asset:
    name: Create Release Asset
    runs-on: ubuntu-latest
    needs: [prepare, build-backend, build-frontend]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update docker-compose.prod.yml repo name
        run: |
          # Dynamically replace the image line for both backend and frontend with the current image name
          IMAGE_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|^[[:space:]]*image: ghcr.io/.*frontend:latest|    image: ghcr.io/$IMAGE_LOWER-frontend:latest|g" docker-compose.prod.yml
          sed -i "s|^[[:space:]]*image: ghcr.io/.*backend:latest|    image: ghcr.io/$IMAGE_LOWER-backend:latest|g" docker-compose.prod.yml

      - name: Update README.md repo URLs
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          REPO_NAME="${{ github.event.repository.name }}"
          GH_USERNAME="${{ github.repository_owner }}"
          REPO_LOWER=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
          GH_USER_LOWER=$(echo "$GH_USERNAME" | tr '[:upper:]' '[:lower:]')
          
          # Replace the git clone instruction under the exact header
          sed -i -e '/# Clone the repository/{n;s|git clone .*|git clone '"$REPO_URL"'\.git \&\& cd '"$REPO_NAME"'|;}' README.md
          
          # Replace the backend URL in the Docker Images table
          sed -i -e 's@| Backend | `ghcr.io/.*-backend:latest` |@| Backend | `ghcr.io/'"$GH_USER_LOWER"'/'"$REPO_LOWER"'-backend:latest` |@g' README.md
          
          # Replace the frontend URL in the Docker Images table
          sed -i -e 's@| Frontend | `ghcr.io/.*-frontend:latest` |@| Frontend | `ghcr.io/'"$GH_USER_LOWER"'/'"$REPO_LOWER"'-frontend:latest` |@g' README.md
          
          # Only commit if there are changes
          if [[ -n $(git status -s README.md) ]]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -am "docs: Auto-update README repo URLs for release ${{ needs.prepare.outputs.release_tag }}"
            git push
          fi

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: |
            docker-compose.prod.yml
            .env.example
          generate_release_notes: true
          body: |
            ## 🚀 Deployment Instructions
            
            1. Download the attached `docker-compose.prod.yml` and `.env.example` files to your server.
            2. Rename `.env.example` to `.env` and update the environment variables as needed.
            3. Start the application by running:
               ```bash
               docker compose -f docker-compose.prod.yml up -d
               ```
