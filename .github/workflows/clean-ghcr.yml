name: Clean GHCR Packages

on:
  schedule:
    # Run every Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      keep:
        description: 'Number of images to keep'
        required: true
        default: '4'

jobs:
  clean-ghcr:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    strategy:
      matrix:
        package: ['mfa-backend', 'mfa-frontend']

    steps:
      - name: Delete old packages
        uses: dataaxiom/ghcr-cleanup-action@v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ matrix.package }}
          keep-n-most-recent: ${{ github.event.inputs.keep || '4' }}
          validate-token: true
