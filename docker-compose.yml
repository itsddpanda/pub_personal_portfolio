services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - mfa_data:/data
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mfa_data:
